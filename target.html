<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Spiral Project — Print Target</title>
  <style>
    body { background: #fff; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; font-family: monospace; margin: 0; }
    h2 { font-size: 13px; letter-spacing: 0.2em; color: #444; margin-bottom: 8px; text-transform: uppercase; }
    p  { font-size: 11px; color: #888; margin: 0 0 24px; letter-spacing: 0.1em; text-align: center; }
    .frame { border: 4px solid #000; padding: 12px; background: #fff; display: inline-block; }
    @media print {
      body { margin: 0; }
      h2, p, .hint { display: none; }
      .frame { border: 4px solid #000; padding: 12px; }
    }
    .hint { margin-top: 20px; font-size: 11px; color: #aaa; letter-spacing: 0.12em; text-align: center; max-width: 400px; line-height: 1.8; }
  </style>
</head>
<body>
  <h2>The Spiral Project — AR Target</h2>
  <p>Print this page · Point your phone at the target · The spiral appears</p>

  <div class="frame">
    <canvas id="t" width="500" height="500"></canvas>
  </div>

  <div class="hint">
    Print at 100% scale · Do not scale to fit · Minimum print size 10cm × 10cm<br>
    After printing, compile this image at:<br>
    hiukim.github.io/mind-ar-js-doc/tools/compile
  </div>

  <script>
  (function(){
    const c   = document.getElementById('t');
    const ctx = c.getContext('2d');
    const W   = 500, H = 500;

    // ── White background ──────────────────────────────────────────────────
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(0, 0, W, H);

    // ── Outer registration border ─────────────────────────────────────────
    ctx.strokeStyle = '#000';
    ctx.lineWidth   = 6;
    ctx.strokeRect(6, 6, W-12, H-12);

    // ── Corner registration marks (L-shapes) ──────────────────────────────
    const marks = [[20,20],[W-20,20],[20,H-20],[W-20,H-20]];
    const ml = 30;
    marks.forEach(([mx,my],i) => {
      ctx.strokeStyle = '#000';
      ctx.lineWidth   = 3;
      ctx.beginPath();
      const dx = i%2===0 ? 1 : -1;
      const dy = i<2     ? 1 : -1;
      ctx.moveTo(mx, my);
      ctx.lineTo(mx + dx*ml, my);
      ctx.moveTo(mx, my);
      ctx.lineTo(mx, my + dy*ml);
      ctx.stroke();
    });

    // ── Fibonacci spiral (high contrast black on white) ───────────────────
    const N    = 9;
    const fibs = [1,1];
    for (let i=2;i<N;i++) fibs.push(fibs[i-1]+fibs[i-2]);

    const DIRS = ['down','right','up','left'];
    const sqs  = [{x:0,y:0,size:1,dir:'down'},{x:1,y:0,size:1,dir:'right'}];
    let bx0=0,by0=0,bx1=2,by1=1;
    for(let i=2;i<N;i++){
      const f=fibs[i],d=DIRS[i%4],sq={size:f,dir:d};
      if(d==='up'   ){sq.x=bx0;    sq.y=by0-f; by0-=f;}
      if(d==='left' ){sq.x=bx0-f;  sq.y=by0;   bx0-=f;}
      if(d==='down' ){sq.x=bx0;    sq.y=by1;   by1+=f;}
      if(d==='right'){sq.x=bx1;    sq.y=by0;   bx1+=f;}
      sqs.push(sq);
    }

    const bw = bx1-bx0, bh = by1-by0;
    const sc = Math.min((W-80)/bw, (H-80)/bh);
    const ox = W/2 - (bx0+bw/2)*sc;
    const oy = H/2 - (by0+bh/2)*sc;
    const px = u => ox+u*sc;
    const py = u => oy+u*sc;

    // Draw square grid
    sqs.forEach((sq,i) => {
      const x_=px(sq.x), y_=py(sq.y), s=sq.size*sc;
      // Alternating fill for contrast + trackability
      ctx.fillStyle = i%2===0 ? 'rgba(0,0,0,0.06)' : 'rgba(0,0,0,0.12)';
      ctx.fillRect(x_,y_,s,s);
      ctx.strokeStyle='#000';
      ctx.lineWidth=1.5;
      ctx.strokeRect(x_,y_,s,s);
    });

    // Draw spiral arc
    function arcOf(sq){
      const s=sq.size;
      switch(sq.dir){
        case 'down':  return{cx:sq.x+s,cy:sq.y,   a0:Math.PI,    a1:Math.PI/2};
        case 'right': return{cx:sq.x,  cy:sq.y,   a0:Math.PI/2,  a1:0};
        case 'up':    return{cx:sq.x,  cy:sq.y+s, a0:0,          a1:-Math.PI/2};
        case 'left':  return{cx:sq.x+s,cy:sq.y+s, a0:-Math.PI/2, a1:-Math.PI};
      }
    }

    ctx.strokeStyle = '#000';
    ctx.lineWidth   = 3;
    ctx.beginPath();
    sqs.forEach(sq => {
      const a = arcOf(sq);
      const r = sq.size*sc;
      ctx.arc(px(a.cx), py(a.cy), r, a.a0, a.a1, true);
    });
    ctx.stroke();

    // ── Centre dot ────────────────────────────────────────────────────────
    ctx.beginPath();
    ctx.arc(W/2, H/2, 5, 0, Math.PI*2);
    ctx.fillStyle = '#000';
    ctx.fill();

    // ── φ label ───────────────────────────────────────────────────────────
    ctx.font      = 'bold 14px monospace';
    ctx.fillStyle = '#000';
    ctx.textAlign = 'center';
    ctx.fillText('THE SPIRAL PROJECT', W/2, H-18);

  })();
  </script>
</body>
</html>
