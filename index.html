<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <meta http-equiv="cache-control" content="no-cache, no-store, must-revalidate"/>
  <title>The Spiral Project — Geo AR</title>
  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar-nft.js"></script>
  <style>
    * { margin:0; padding:0; }
    body { overflow:hidden; }
    #ui {
      position:fixed; top:0; left:0; width:100%; height:100%;
      pointer-events:none; z-index:999;
      font-family:'Courier New',monospace;
    }
    #status {
      position:absolute; bottom:40px; left:50%; transform:translateX(-50%);
      background:rgba(0,0,0,0.6); border:1px solid rgba(255,155,20,0.3);
      color:rgba(255,155,20,0.9); font-size:0.7rem;
      letter-spacing:0.2em; text-transform:uppercase;
      padding:10px 24px; border-radius:2px; white-space:nowrap;
      text-align:center;
    }
    #distance {
      position:absolute; top:20px; left:50%; transform:translateX(-50%);
      background:rgba(0,0,0,0.5); border:1px solid rgba(255,155,20,0.2);
      color:rgba(255,155,20,0.7); font-size:0.65rem;
      letter-spacing:0.2em; text-transform:uppercase;
      padding:8px 20px; border-radius:2px; white-space:nowrap;
    }
    #corner-tl,#corner-tr,#corner-bl,#corner-br{
      position:absolute; width:24px; height:24px;
      border-color:rgba(255,155,20,0.25); border-style:solid;
    }
    #corner-tl{top:16px;left:16px;border-width:1px 0 0 1px;}
    #corner-tr{top:16px;right:16px;border-width:1px 1px 0 0;}
    #corner-bl{bottom:16px;left:16px;border-width:0 0 1px 1px;}
    #corner-br{bottom:16px;right:16px;border-width:0 1px 1px 0;}
  </style>
</head>
<body>

<div id="ui">
  <div id="corner-tl"></div><div id="corner-tr"></div>
  <div id="corner-bl"></div><div id="corner-br"></div>
  <div id="distance">The Spiral Project · Locating...</div>
  <div id="status">Loading...</div>
</div>

<canvas id="ar-canvas" width="1024" height="1024" style="display:none;"></canvas>

<a-scene
  vr-mode-ui="enabled:false"
  arjs="sourceType:webcam; videoTexture:true; debugUIEnabled:false;"
  renderer="antialias:true; alpha:true;"
  device-orientation-permission-ui="enabled:false">

  <a-camera gps-projected-camera rotation-reader></a-camera>

  <!-- Spiral plane at exact GPS coordinates -->
  <a-entity
    id="spiral-entity"
    visible="false"
    gps-projected-entity-place="latitude:50.78950526059579; longitude:-1.0840931300536272;"
    scale="10 10 10">
    <a-plane
      id="spiral-plane"
      position="0 0 0"
      rotation="0 0 0"
      width="1" height="1"
      look-at="[gps-projected-camera]"
      material="transparent:true; depthWrite:false; side:double;">
    </a-plane>
  </a-entity>

</a-scene>

<script>
(function(){
  const TARGET_LAT = 50.78950526059579;
  const TARGET_LON = -1.0840931300536272;
  const N   = 10;
  const RCC = [
    [30,30,40],[180,80,10],[255,20,20],[255,140,0],[255,245,0],
    [0,230,80],[30,100,255],[180,0,255],[0,240,255],[255,0,200]
  ];

  function buildData(){
    const fibs=[1,1];
    for(let i=2;i<N;i++) fibs.push(fibs[i-1]+fibs[i-2]);
    const DIRS=['down','right','up','left'];
    const sqs=[{x:0,y:0,size:1,dir:'down'},{x:1,y:0,size:1,dir:'right'}];
    let x0=0,y0=0,x1=2,y1=1;
    for(let i=2;i<N;i++){
      const f=fibs[i],d=DIRS[i%4],sq={size:f,dir:d};
      if(d==='up'){sq.x=x0;sq.y=y0-f;y0-=f;}
      if(d==='left'){sq.x=x0-f;sq.y=y0;x0-=f;}
      if(d==='down'){sq.x=x0;sq.y=y1;y1+=f;}
      if(d==='right'){sq.x=x1;sq.y=y0;x1+=f;}
      sqs.push(sq);
    }
    return{sqs,bounds:{x0,y0,x1,y1}};
  }
  function arcOf(sq){
    const s=sq.size;
    switch(sq.dir){
      case'down': return{cx:sq.x+s,cy:sq.y,a0:Math.PI,a1:Math.PI/2};
      case'right':return{cx:sq.x,cy:sq.y,a0:Math.PI/2,a1:0};
      case'up':   return{cx:sq.x,cy:sq.y+s,a0:0,a1:-Math.PI/2};
      case'left': return{cx:sq.x+s,cy:sq.y+s,a0:-Math.PI/2,a1:-Math.PI};
    }
  }

  const data=buildData();
  const {x0,y0,x1,y1}=data.bounds;
  const bw=x1-x0,bh=y1-y0,SIZE=1024;
  const sc_=Math.min(SIZE/bw,SIZE/bh)*0.47;
  const ox=SIZE/2-(x0+bw/2)*sc_;
  const oy=SIZE/2-(y0+bh/2)*sc_;
  const px=u=>ox+u*sc_;
  const py=u=>oy+u*sc_;
  const MAXP=(N-1)*0.9+1;

  let prog=0,phase='fadein',holdTimer=0,gA=0,lastT=null,particles=[];
  function reset(){prog=0;phase='fadein';gA=0;holdTimer=0;particles=[];}

  const canvas=document.getElementById('ar-canvas');
  const ctx=canvas.getContext('2d');
  const status=document.getElementById('status');
  const distEl=document.getElementById('distance');

  // ── Geofence & Distance ──────────────────────────────────────────────────
  const GEOFENCE_RADIUS = 20; // metres

  function haversine(lat1,lon1,lat2,lon2){
    const R=6371000,dLat=(lat2-lat1)*Math.PI/180,dLon=(lon2-lon1)*Math.PI/180;
    const a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
    return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
  }

  let insideFence = false;

  function updateFence(dist){
    const wasInside = insideFence;
    insideFence = dist <= GEOFENCE_RADIUS;
    const entity = document.getElementById('spiral-entity');
    if(entity){
      entity.setAttribute('visible', insideFence);
    }
    if(insideFence && !wasInside){
      // Just entered — reset animation
      reset();
      status.textContent = 'Spiral unlocked · φ';
    } else if(!insideFence && wasInside){
      status.textContent = 'Move closer · ' + Math.round(dist) + 'm away';
    }
  }

  if(navigator.geolocation){
    navigator.geolocation.watchPosition(pos=>{
      const d=haversine(pos.coords.latitude,pos.coords.longitude,TARGET_LAT,TARGET_LON);
      const dm=Math.round(d);
      if(dm <= GEOFENCE_RADIUS){
        distEl.textContent = `The Spiral Project · You are inside the zone`;
      } else {
        distEl.textContent = `The Spiral Project · ${dm}m to spiral`;
      }
      updateFence(d);
    },{enableHighAccuracy:true,maximumAge:1000,timeout:10000});
  }

  // ── Draw loop ────────────────────────────────────────────────────────────
  function tick(t){
    if(!lastT)lastT=t;
    const dt=Math.min((t-lastT)/1000,0.05);
    lastT=t;
    if(phase==='fadein'){gA=Math.min(1,gA+dt*1.1);prog=Math.min(0.6,prog+dt*1.6);if(gA>=1)phase='draw';}
    else if(phase==='draw'){prog=Math.min(MAXP,prog+dt*1.4);if(prog>=MAXP){phase='hold';holdTimer=0;}}
    else if(phase==='hold'){holdTimer+=dt;if(holdTimer>2.5)phase='fadeout';}
    else if(phase==='fadeout'){gA=Math.max(0,gA-dt*0.9);if(gA<=0)reset();}

    ctx.clearRect(0,0,SIZE,SIZE);

    data.sqs.forEach((sq,i)=>{
      const rev=Math.max(0,Math.min(1,(prog-i*0.9)/0.9));
      if(rev<=0)return;
      const[r,g,b]=RCC[i];
      const ps=sq.size*sc_,px_=px(sq.x),py_=py(sq.y);
      ctx.fillStyle=`rgba(${r},${g},${b},${rev*gA*0.7})`;
      ctx.fillRect(px_,py_,ps,ps);
      ctx.strokeStyle=`#000`;ctx.lineWidth=4;ctx.strokeRect(px_,py_,ps,ps);
      ctx.strokeStyle=`rgb(${r},${g},${b})`;ctx.lineWidth=2;ctx.strokeRect(px_,py_,ps,ps);
    });

    data.sqs.forEach((sq,i)=>{
      const ap=Math.max(0,Math.min(1,(prog-i*0.9)/0.9));
      if(ap<=0)return;
      const arc=arcOf(sq),r=sq.size*sc_;
      const cx_=px(arc.cx),cy_=py(arc.cy);
      const end=arc.a0+(arc.a1-arc.a0)*ap;
      const lw=Math.max(8,20-i*0.8);
      ctx.beginPath();ctx.arc(cx_,cy_,r,arc.a0,end,true);
      ctx.strokeStyle=`rgb(255,195,30)`;
      ctx.lineWidth=lw+6;ctx.stroke();
      ctx.beginPath();ctx.arc(cx_,cy_,r,arc.a0,end,true);
      ctx.strokeStyle=`rgba(255,240,160,${0.7*gA})`;
      ctx.lineWidth=Math.max(2,lw*0.35);ctx.stroke();

      if(ap<1&&i===Math.min(N-1,Math.floor(prog/0.9))){
        const tx=cx_+r*Math.cos(end),ty=cy_+r*Math.sin(end);
        if(Math.random()<0.45)particles.push({x:tx,y:ty,vx:(Math.random()-0.5)*7,vy:(Math.random()-0.5)*7,life:1,size:Math.random()*6+2});
        ctx.beginPath();ctx.arc(tx,ty,12,0,Math.PI*2);
        ctx.fillStyle=`rgba(255,255,220,${gA})`;ctx.fill();
      }
    });

    particles=particles.filter(p=>p.life>0.02);
    particles.forEach(p=>{
      p.x+=p.vx;p.y+=p.vy;p.vx*=0.89;p.vy*=0.89;p.life-=0.022;
      ctx.beginPath();ctx.arc(p.x,p.y,p.size*p.life,0,Math.PI*2);
      ctx.fillStyle=`rgba(255,195,30,${p.life*0.6*gA})`;ctx.fill();
    });

    const plane=document.getElementById('spiral-plane');
    if(plane?.components?.material?.material?.map)
      plane.components.material.material.map.needsUpdate=true;

    requestAnimationFrame(tick);
  }

  const scene=document.querySelector('a-scene');
  scene.addEventListener('loaded',()=>{
    status.textContent='Walk to the location · Spiral will appear';
    document.getElementById('spiral-plane').setAttribute('material','src',canvas);
    reset();
    requestAnimationFrame(tick);
  });

})();
</script>
</body>
</html>
